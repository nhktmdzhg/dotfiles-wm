rules = (
  {
    match = "focused";
    opacity = 1.0;
  },
  {
    match = "!focused";
    opacity = 0.99;
  }
);
animations = (
  {
    triggers = [ "open", "increase-opacity" ];
    opacity = {
      curve = "cubic-bezier(0.22,1.3,0.36,1)";
      duration = 0.5;
      start = 0.0;
      end = 1.0;
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
    scale-x = {
      curve = "cubic-bezier(0.22,1.3,0.36,1)";
      duration = 0.5;
      start = 0.8;
      end = 1.0;
    };
    scale-y = "scale-x";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height - 20";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },
  {
    triggers = [ "show" ];
    opacity = {
      curve = "cubic-bezier(0.24,0.64,0.79,0.98)";
      duration = 0.3;
      start = 0.0;
      end = 1.0;
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
    scale-x = {
      curve = "cubic-bezier(0.24,0.64,0.79,0.98)";
      duration = 0.3;
      start = 0.9;
      end = 1.0;
    };
    scale-y = "scale-x";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },
  {
    triggers = [ "close" ];
    opacity = {
      curve = "cubic-bezier(0.22,0.9,0.36,1)";
      duration = 0.4;
      start = 1.0;
      end = 0.0;
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
    scale-x = {
      curve = "cubic-bezier(0,0.9,1,1)";
      duration = 0.5;
      start = 1.0;
      end = 0.85;
    };
    scale-y = "scale-x";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height + 15";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },
  {
    triggers = [ "hide" ];
    opacity = {
      curve = "cubic-bezier(0.21,0.02,0.76,0.36)";
      duration = 0.25;
      start = 1.0;
      end = 0.0;
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
    scale-x = {
      curve = "linear";
      duration = 0.2;
      start = 1.0;
      end = 0.95;
    };
    scale-y = "scale-x";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },
  {
    triggers = [ "geometry" ];
    scale-x = {
      curve = "cubic-bezier(0.22,1.3,0.36,1)";
      duration = 0.3;
      start = "window-width-before / window-width";
      end = 1.0;
    };
    scale-y = {
      curve = "cubic-bezier(0.22,1.3,0.36,1)";
      duration = 0.3;
      start = "window-height-before / window-height";
      end = 1.0;
    };
    offset-x = {
      curve = "cubic-bezier(0.22,1.3,0.36,1)";
      duration = 0.3;
      start = "window-x-before - window-x";
      end = 0;
    };
    offset-y = {
      curve = "cubic-bezier(0.22,1.3,0.36,1)";
      duration = 0.3;
      start = "window-y-before - window-y";
      end = 0;
    };
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  }
)
shadow = false;
shadow-radius = 0;
shadow-opacity = 0;
shadow-offset-x = 0;
shadow-offset-y = 0;

fading = false;
fade-in-step = 0.023;
fade-out-step = 0.035;
fade-delta = 11;

frame-opacity = 1.0;
backend = "egl";
dithered-present = false;
vsync = false;

detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
unredir-if-possible = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
xrender-sync-fence = false;
transparent-clipping = false;
log-level = "warn";
log-file = "/dev/null";
no-fading-destroyed-argb = true;
unredir-if-possible-delay = 101;

